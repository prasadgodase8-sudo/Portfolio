<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="display-3 text-center mt-5">Weather Application</h1>

    <div class="container weather-container">
        <div class="row">
            <div class="form-floating">
                <input type="text" class="form-control" id="cityInput" placeholder="City Name">
                <label for="cityInput">City Name</label>
            </div>

            <div>
                <button class="btn btn-primary w-100 mt-3" onclick="getWeatherData()">
                    Search Weather
                </button>
            </div>

            <div id="dataResult" class="mt-4"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
